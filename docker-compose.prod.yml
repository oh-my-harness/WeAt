services:
  matrix:
    image: ghcr.nju.edu.cn/matrix-construct/tuwunel:latest
    container_name: weat_matrix
    restart: unless-stopped
    volumes:
      - matrix-data:/var/lib/tuwunel
    environment:
      TUWUNEL_SERVER_NAME: ${SERVER_NAME}
      TUWUNEL_ADDRESS: 0.0.0.0
      TUWUNEL_PORT: 8008
      TUWUNEL_ALLOW_REGISTRATION: "true"
      TUWUNEL_YES_I_AM_VERY_VERY_SURE_I_WANT_AN_OPEN_REGISTRATION_SERVER_PRONE_TO_ABUSE: "true"
      TUWUNEL_ALLOW_FEDERATION: "false"
      TUWUNEL_LOG: info

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: weat_backend
    restart: unless-stopped
    environment:
      MATRIX_BASE: http://matrix:8008
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      MATRIX_ADMIN_USER: ${MATRIX_ADMIN_USER}
      MATRIX_ADMIN_PASSWORD: ${MATRIX_ADMIN_PASSWORD}
      SERVER_NAME: ${SERVER_NAME}
    depends_on:
      - matrix

  nginx:
    image: nginx:alpine
    container_name: weat_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend

volumes:
  matrix-data:
